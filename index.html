<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A single-file dice game score sheet implemented with hyperscript. No custom JavaScript."
    />
    <meta name="author" content="Jeffrey Morrison" />
    <title>Dice Game — Score Sheet</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/hyperscript.org@0.9.91/dist/_hyperscript.min.js"
      crossorigin="anonymous"
    ></script>

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/favicon.ico" />
  </head>
  <body>
    <header>
      <h1>Dice Game</h1>
      <p>Score Sheet</p>
      <p><small>Inspired by Yahtzee</small></p>
    </header>

    <main>
      <div class="sheet-grid">
        <section aria-labelledby="upper-caption">
          <form
            id="upper-form"
            _="
            on yz:submit
              for input in <[yz-scoreable]/> in me
                set input.disabled to true
              end
              set @yz-submitted to 'true'
              send yz:submit to <#upper-total/>
              send yz:submit to <#grand-total/>
            end
            on yz:unsubmit
              remove @yz-submitted from me
              send edit to <#upper-total/>
              for input in <[yz-scoreable]/> in me
                set input.disabled to false
              end
            end
            on game:reset
              my.reset()
              remove @yz-submitted from me
              for input in <[yz-scoreable]/> in me
                set input.disabled to false
              end
            end
            "
          >
            <table>
              <caption id="upper-caption">
                Upper Section
              </caption>
              <thead>
                <tr>
                  <th scope="col">Category</th>
                  <th scope="col">How to Score</th>
                  <th scope="col" abbr="Score">Pts</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row"><label for="aces">Aces</label></th>
                  <td>Sum of all <span aria-hidden="true">⚀</span> 1s</td>
                  <td>
                    <input
                      type="number"
                      id="aces"
                      name="aces"
                      yz-scoreable
                      min="0"
                      max="5"
                      step="1"
                      inputmode="numeric"
                      placeholder="—"
                    />
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="twos">Twos</label></th>
                  <td>Sum of all <span aria-hidden="true">⚁</span> 2s</td>
                  <td>
                    <input
                      type="number"
                      id="twos"
                      name="twos"
                      yz-scoreable
                      min="0"
                      max="10"
                      step="2"
                      inputmode="numeric"
                      placeholder="—"
                    />
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="threes">Threes</label></th>
                  <td>Sum of all <span aria-hidden="true">⚂</span> 3s</td>
                  <td>
                    <input
                      type="number"
                      id="threes"
                      name="threes"
                      yz-scoreable
                      min="0"
                      max="15"
                      step="3"
                      inputmode="numeric"
                      placeholder="—"
                    />
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="fours">Fours</label></th>
                  <td>Sum of all <span aria-hidden="true">⚃</span> 4s</td>
                  <td>
                    <input
                      type="number"
                      id="fours"
                      name="fours"
                      yz-scoreable
                      min="0"
                      max="20"
                      step="4"
                      inputmode="numeric"
                      placeholder="—"
                    />
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="fives">Fives</label></th>
                  <td>Sum of all <span aria-hidden="true">⚄</span> 5s</td>
                  <td>
                    <input
                      type="number"
                      id="fives"
                      name="fives"
                      yz-scoreable
                      min="0"
                      max="25"
                      step="5"
                      inputmode="numeric"
                      placeholder="—"
                    />
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="sixes">Sixes</label></th>
                  <td>Sum of all <span aria-hidden="true">⚅</span> 6s</td>
                  <td>
                    <input
                      type="number"
                      id="sixes"
                      name="sixes"
                      yz-scoreable
                      min="0"
                      max="30"
                      step="6"
                      inputmode="numeric"
                      placeholder="—"
                    />
                  </td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3">
                    <button
                      type="button"
                      _="
                      on click send yz:submit to <#upper-form/>
                      on yz:submit from <#upper-form/> add @disabled to me
                      on yz:unsubmit from <#upper-form/> remove @disabled from me
                      on game:reset remove @disabled from me
                      "
                    >
                      Finalize Upper
                    </button>
                    <button
                      disabled
                      type="button"
                      _="
                      on click send yz:unsubmit to <#upper-form/>
                      on yz:submit from <#upper-form/> remove @disabled from me
                      on yz:unsubmit from <#upper-form/> add @disabled to me
                      on game:reset add @disabled to me
                      "
                    >
                      Edit Upper
                    </button>
                  </td>
                </tr>
              </tfoot>
            </table>
          </form>
          <div class="section-total">
            <span>Upper Total</span>
            <output
              id="upper-total"
              for="aces twos threes fours fives sixes"
              _="
              on yz:submit
                set total to 0
                for input in <[yz-scoreable]/> in <#upper-form/>
                  set total to total + (input.value as Int or 0)
                end
                set my value to total
              end
              on edit set my value to '—'
              on game:reset set my value to '—'
              "
              >—</output
            >
          </div>
        </section>
      </div>

      <div class="grand-total">
        <div>
          <label for="grand-total">Grand Total</label>
          <output
            id="grand-total"
            for="upper-total"
            _="
            on yz:submit
              set upperForm to first <#upper-form/>
              if upperForm.matches('[yz-submitted]')
                set total to 0
                for input in <[yz-scoreable]/> in upperForm
                  set total to total + (input.value as Int or 0)
                end
                set my value to total
              end
            end
            on game:reset set my value to '—'
            "
            >—</output
          >
        </div>
        <button
          type="button"
          class="new-game-btn"
          aria-label="Start a new game and clear all scores"
          _="on click if confirm('Start a new game? All scores will be cleared.') send game:reset to <form, button, output/>"
        >
          New Game
        </button>
      </div>
    </main>
  </body>
</html>
