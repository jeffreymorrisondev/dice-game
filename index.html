<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A single-file dice game score sheet implemented with hyperscript. No custom JavaScript."
    />
    <meta name="author" content="Jeffrey Morrison" />
    <title>Dice Game — Score Sheet</title>
    <link rel="stylesheet" href="static/style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/hyperscript.org@0.9.91/dist/_hyperscript.min.js"
      crossorigin="anonymous"
    ></script>

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/assets/favicon.ico" />
  </head>
  <body>
    <header>
      <h1>Dice Game</h1>
      <p>Score Sheet</p>
      <p><small>Inspired by Yahtzee</small></p>
    </header>

    <main>
      <div class="sheet-grid">
        <section aria-labelledby="upper-caption">
          <form
            id="upper-form"
            _="
            on yz:submit
              set total to 0
              for input in <[yz-scoreable]/> in me
                set coerced to (input.value or 0) as Int
                set total to total + coerced
                set out to the next <output/> from input
                set out.value to coerced
                add @hidden to input
                remove @hidden from out
              end
              send yz:submit(total: total) to <#upper-total/>
              send yz:submit(total: total) to <#grand-total/>
            end
            on yz:reopen
              for input in <[yz-scoreable]/> in me
                set out to the next <output/> from input
                set input.value to (out.value or 0) as Int
                remove @hidden from input
                add @hidden to out
              end
            end
            on yz:cancel
              for input in <[yz-scoreable]/> in me
                set out to the next <output/> from input
                add @hidden to input
                remove @hidden from out
              end
            end
            on yz:reset
              my.reset()
              for input in <[yz-scoreable]/> in me
                set out to the next <output/> from input
                remove @hidden from input
                add @hidden to out
                set out.value to ''
              end
            end
            "
          >
            <table>
              <caption id="upper-caption">
                Upper Section
              </caption>
              <thead>
                <tr>
                  <th scope="col">Category</th>
                  <th scope="col">How to Score</th>
                  <th scope="col" abbr="Score">Pts</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row"><label for="aces">Aces</label></th>
                  <td>Sum of all <span class="dice" aria-hidden="true">⚀</span> 1s</td>
                  <td>
                    <input
                      type="number"
                      id="aces"
                      name="aces"
                      yz-scoreable
                      min="0"
                      max="5"
                      step="1"
                      inputmode="numeric"
                      placeholder="—"
                    />
                    <output for="aces" hidden>—</output>
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="twos">Twos</label></th>
                  <td>Sum of all <span class="dice" aria-hidden="true">⚁</span> 2s</td>
                  <td>
                    <input
                      type="number"
                      id="twos"
                      name="twos"
                      yz-scoreable
                      min="0"
                      max="10"
                      step="2"
                      inputmode="numeric"
                      placeholder="—"
                    />
                    <output for="twos" hidden>—</output>
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="threes">Threes</label></th>
                  <td>Sum of all <span class="dice" aria-hidden="true">⚂</span> 3s</td>
                  <td>
                    <input
                      type="number"
                      id="threes"
                      name="threes"
                      yz-scoreable
                      min="0"
                      max="15"
                      step="3"
                      inputmode="numeric"
                      placeholder="—"
                    />
                    <output for="threes" hidden>—</output>
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="fours">Fours</label></th>
                  <td>Sum of all <span class="dice" aria-hidden="true">⚃</span> 4s</td>
                  <td>
                    <input
                      type="number"
                      id="fours"
                      name="fours"
                      yz-scoreable
                      min="0"
                      max="20"
                      step="4"
                      inputmode="numeric"
                      placeholder="—"
                    />
                    <output for="fours" hidden>—</output>
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="fives">Fives</label></th>
                  <td>Sum of all <span class="dice" aria-hidden="true">⚄</span> 5s</td>
                  <td>
                    <input
                      type="number"
                      id="fives"
                      name="fives"
                      yz-scoreable
                      min="0"
                      max="25"
                      step="5"
                      inputmode="numeric"
                      placeholder="—"
                    />
                    <output for="fives" hidden>—</output>
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="sixes">Sixes</label></th>
                  <td>Sum of all <span class="dice" aria-hidden="true">⚅</span> 6s</td>
                  <td>
                    <input
                      type="number"
                      id="sixes"
                      name="sixes"
                      yz-scoreable
                      min="0"
                      max="30"
                      step="6"
                      inputmode="numeric"
                      placeholder="—"
                    />
                    <output for="sixes" hidden>—</output>
                  </td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3">
                    <button
                      type="button"
                      _="
                      on click send yz:submit to <#upper-form/> add @disabled to me add @hidden to me
                      on yz:reopen from <#upper-form/> remove @disabled from me remove @hidden from me
                      on yz:cancel from <#upper-form/> add @disabled to me add @hidden to me
                      on yz:reset remove @disabled from me
                      "
                    >
                      Close Upper
                    </button>
                    <button
                      disabled
                      hidden
                      type="button"
                      _="
                      on click send yz:reopen to <#upper-form/> add @disabled to me add @hidden to me
                      on yz:submit from <#upper-form/> remove @disabled from me remove @hidden from me
                      on yz:cancel from <#upper-form/> remove @disabled from me remove @hidden from me
                      on yz:reset add @hidden to me add @disabled to me
                      "
                    >
                      Reopen Upper
                    </button>
                    <button
                      disabled
                      hidden
                      type="button"
                      _="
                      on click send yz:cancel to <#upper-form/> add @disabled to me add @hidden to me
                      on yz:reopen from <#upper-form/> remove @disabled from me remove @hidden from me
                      on yz:submit from <#upper-form/> add @disabled to me add @hidden to me
                      on yz:reset add @disabled to me add @hidden to me
                      "
                    >
                      Cancel
                    </button>
                  </td>
                </tr>
              </tfoot>
            </table>
          </form>
          <div class="section-total">
            <span>Upper Total</span>
            <output
              id="upper-total"
              for="aces twos threes fours fives sixes"
              _="
              on yz:submit(total)
                set my value to total
              end
              on yz:reset set my value to '—'
              "
              >—</output
            >
          </div>
        </section>
      </div>

      <div class="grand-total">
        <div>
          <label for="grand-total">Grand Total</label>
          <output
            id="grand-total"
            for="upper-total"
            _="
            on yz:submit(total)
              set my value to total
            end
            on yz:reset set my value to '—'
            "
            >—</output
          >
        </div>
        <button
          type="button"
          class="new-game-btn"
          aria-label="Start a new game and clear all scores"
          _="on click if confirm('Start a new game? All scores will be cleared.') send yz:reset to <form, button, output/>"
        >
          New Game
        </button>
      </div>
    </main>
  </body>
</html>
