<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A single-file dice game score sheet implemented with hyperscript. No custom JavaScript."
    />
    <meta name="author" content="Jeffrey Morrison" />
    <title>Dice Game — Score Sheet</title>
    <link rel="stylesheet" href="static/style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/hyperscript.org@0.9.91/dist/_hyperscript.min.js"
      crossorigin="anonymous"
    ></script>

    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon-16x16.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" href="/assets/favicon.ico" />
  </head>
  <body>
    <header>
      <h1>Dice Game</h1>
      <p>Score Sheet</p>
      <p><small>Inspired by Yahtzee</small></p>
    </header>

    <main>
      <div class="sheet-grid">
        <section aria-labelledby="upper-caption">
          <form
            id="upper-form"
            _="
            init set @yz-state to 'open' on me end

            on yz:submit
            
              for input in <[yz-scoreable]/> in me
                set input.value to ((its value or 0) as Int)
              end
              if not my.reportValidity() exit end

              set subtotal to 0
              for input in <[yz-scoreable]/> in me
                set val to input.value as Int
                set subtotal to subtotal + val
                set out to the next <output/> from input
                set out.value to val
              end
              send yz:submit(subtotal: subtotal) to <#upper-subtotal/>
              send yz:submit(subtotal: subtotal) to <#upper-bonus/>
              send yz:submit(subtotal: subtotal) to <#upper-total/>
              set @yz-state to 'closed' on me
            end

            on yz:reopen
              for input in <[yz-scoreable]/> in me
                set out to the next <output/> from input
                set input.value to (out.value or 0) as Int
              end
              set @yz-state to 'editing' on me
            end
            on yz:cancel
              set @yz-state to 'closed' on me
            end

            on yz:clear
              my.reset()
              for input in <[yz-scoreable]/> in me
                set out to the next <output/> from input
                set out.value to ''
              end
              set @yz-state to 'open' on me
            end
            "
          >
            <table>
              <caption
                id="upper-caption"
                _="
                bind state to #upper-form@yz-state
                  set my textContent to 'Upper Section (' + state + ')'
                end
                  "
              ></caption>
              <thead>
                <tr>
                  <th scope="col">Category</th>
                  <th scope="col">How to Score</th>
                  <th scope="col" abbr="Score">Pts</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <th scope="row"><label for="aces">Aces</label></th>
                  <td>
                    Sum of all <span class="dice" aria-hidden="true">⚀</span> 1s
                  </td>
                  <td>
                    <input
                      type="number"
                      id="aces"
                      name="aces"
                      yz-scoreable
                      required
                      min="0"
                      max="5"
                      step="1"
                      inputmode="numeric"
                      placeholder="—"
                      _="bind @hidden to (#upper-form@yz-state is 'closed')"
                    />
                    <output
                      for="aces"
                      hidden
                      _="bind @hidden to (#upper-form@yz-state is not 'closed')"
                      >—</output
                    >
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="twos">Twos</label></th>
                  <td>
                    Sum of all <span class="dice" aria-hidden="true">⚁</span> 2s
                  </td>
                  <td>
                    <input
                      type="number"
                      id="twos"
                      name="twos"
                      yz-scoreable
                      required
                      min="0"
                      max="10"
                      step="2"
                      inputmode="numeric"
                      placeholder="—"
                      _="bind @hidden to (#upper-form@yz-state is 'closed')"
                    />
                    <output
                      for="twos"
                      hidden
                      _="bind @hidden to (#upper-form@yz-state is not 'closed')"
                      >—</output
                    >
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="threes">Threes</label></th>
                  <td>
                    Sum of all <span class="dice" aria-hidden="true">⚂</span> 3s
                  </td>
                  <td>
                    <input
                      type="number"
                      id="threes"
                      name="threes"
                      yz-scoreable
                      required
                      min="0"
                      max="15"
                      step="3"
                      inputmode="numeric"
                      placeholder="—"
                      _="bind @hidden to (#upper-form@yz-state is 'closed')"
                    />
                    <output
                      for="threes"
                      hidden
                      _="bind @hidden to (#upper-form@yz-state is not 'closed')"
                      >—</output
                    >
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="fours">Fours</label></th>
                  <td>
                    Sum of all <span class="dice" aria-hidden="true">⚃</span> 4s
                  </td>
                  <td>
                    <input
                      type="number"
                      id="fours"
                      name="fours"
                      yz-scoreable
                      required
                      min="0"
                      max="20"
                      step="4"
                      inputmode="numeric"
                      placeholder="—"
                      _="bind @hidden to (#upper-form@yz-state is 'closed')"
                    />
                    <output
                      for="fours"
                      hidden
                      _="bind @hidden to (#upper-form@yz-state is not 'closed')"
                      >—</output
                    >
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="fives">Fives</label></th>
                  <td>
                    Sum of all <span class="dice" aria-hidden="true">⚄</span> 5s
                  </td>
                  <td>
                    <input
                      type="number"
                      id="fives"
                      name="fives"
                      yz-scoreable
                      required
                      min="0"
                      max="25"
                      step="5"
                      inputmode="numeric"
                      placeholder="—"
                      _="bind @hidden to (#upper-form@yz-state is 'closed')"
                    />
                    <output
                      for="fives"
                      hidden
                      _="bind @hidden to (#upper-form@yz-state is not 'closed')"
                      >—</output
                    >
                  </td>
                </tr>
                <tr>
                  <th scope="row"><label for="sixes">Sixes</label></th>
                  <td>
                    Sum of all <span class="dice" aria-hidden="true">⚅</span> 6s
                  </td>
                  <td>
                    <input
                      type="number"
                      id="sixes"
                      name="sixes"
                      yz-scoreable
                      required
                      min="0"
                      max="30"
                      step="6"
                      inputmode="numeric"
                      placeholder="—"
                      _="bind @hidden to (#upper-form@yz-state is 'closed')"
                    />
                    <output
                      for="sixes"
                      hidden
                      _="bind @hidden to (#upper-form@yz-state is not 'closed')"
                      >—</output
                    >
                  </td>
                </tr>
              </tbody>
              <tfoot>
                <tr>
                  <td colspan="3">
                    <button
                      type="button"
                      yz-action="close"
                      _="on click send yz:submit to closest <form/> end
                         bind @hidden to (#upper-form@yz-state is 'closed')
                         bind @disabled to (#upper-form@yz-state is 'closed')
                         "
                    >
                      Close Upper
                    </button>
                    <button
                      hidden
                      type="button"
                      yz-action="reopen"
                      _="on click send yz:reopen to closest <form/> end
                         bind @hidden to (#upper-form@yz-state is not 'closed')
                         bind @disabled to (#upper-form@yz-state is not 'closed')
                         "
                    >
                      Reopen Upper
                    </button>
                    <button
                      hidden
                      type="button"
                      yz-action="cancel"
                      _="on click send yz:cancel to closest <form/> end
                         bind @hidden to (#upper-form@yz-state is not 'editing')
                         bind @disabled to (#upper-form@yz-state is not 'editing')
                         "
                    >
                      Cancel
                    </button>
                  </td>
                </tr>
              </tfoot>
            </table>
          </form>
          <div class="section-totals">
            <div class="section-total">
              <span>Subtotal</span>
              <output
                id="upper-subtotal"
                for="aces twos threes fours fives sixes"
                _="
                on yz:submit(subtotal)
                  set my value to subtotal
                end
                on yz:clear from <#upper-form/>
                  set my value to '—'
                end
                "
                >—</output
              >
            </div>
            <div class="section-total">
              <span>Bonus (+35 if subtotal ≥ 63)</span>
              <output
                id="upper-bonus"
                for="upper-subtotal"
                _="
                on yz:submit(subtotal)
                  if subtotal >= 63
                    set my value to '✓'
                    add .earned to me
                  else
                    set my value to '—'
                    remove .earned from me
                  end
                end
                on yz:clear from <#upper-form/>
                  set my value to '—'
                  remove .earned from me
                end
                "
                >—</output
              >
            </div>
            <div class="section-total">
              <span>Upper Total</span>
              <output
                id="upper-total"
                for="upper-subtotal upper-bonus"
                _="
                on yz:submit(subtotal)
                  set bonus to 0
                  if subtotal >= 63 set bonus to 35 end
                  set my value to subtotal + bonus
                end
                on yz:clear from <#upper-form/>
                  set my value to '—'
                end
                "
                >—</output
              >
            </div>
          </div>
        </section>
      </div>

      <div class="grand-total">
        <div>
          <label for="grand-total">Grand Total</label>
          <output
            id="grand-total"
            for="upper-total"
            _="
            on yz:submit(total)
              set my value to total
            end
            on yz:clear from <#upper-form/> set my value to '—'
            "
            >—</output
          >
        </div>
        <button
          type="button"
          class="new-game-btn"
          aria-label="Start a new game and clear all scores"
          _="on click if confirm('Start a new game? All scores will be cleared.') send yz:clear to <form/>"
        >
          New Game
        </button>
      </div>
    </main>
  </body>
</html>
